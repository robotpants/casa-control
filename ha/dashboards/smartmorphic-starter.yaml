# =============================================================================
# Smartmorphic — Starter Dashboard (Lovelace YAML)
# A template dashboard that shows the theme at its best. Designed for Mushroom
# cards (install via HACS first). Substitute your actual entity IDs anywhere
# you see "REPLACE_ME".
#
# Install:
#   1. Settings → Dashboards → Add Dashboard → New dashboard from scratch.
#   2. Open the dashboard → top-right kebab → Edit dashboard → top-right kebab
#      again → Raw configuration editor → paste this entire file → Save.
#   3. Or, to make it the default: Settings → Dashboards → click your dashboard
#      → Set as default for all users.
# =============================================================================

title: Casa
views:
  # ---------------------------------------------------------------------------
  # Home view — greeting, scenes, room grid
  # ---------------------------------------------------------------------------
  - title: Home
    path: home
    type: sections
    icon: mdi:home
    max_columns: 3
    sections:
      # ---- Greeting + scene chips ----
      - type: grid
        column_span: 3
        cards:
          - type: markdown
            content: |
              # {{ ['Good morning', 'Good afternoon', 'Good evening'][((now().hour - 5) // 6) | min(2) | max(0)] }}
              {{ states('weather.REPLACE_ME') | default('Casa') }} · {{ states('sensor.REPLACE_ME_temperature') | default('—') }}°
            card_mod:
              style: |
                ha-card {
                  background: transparent;
                  box-shadow: none;
                  padding: 0 4px;
                }
                ha-markdown h1 {
                  font-family: Outfit, system-ui, sans-serif;
                  font-weight: 600;
                  font-size: 28px;
                  letter-spacing: -0.3px;
                  margin: 0 0 4px 0;
                }
                ha-markdown p {
                  font-size: 13px;
                  color: var(--secondary-text-color);
                  margin: 0;
                }

          # Scene chip row (uses mushroom-chips-card)
          - type: custom:mushroom-chips-card
            alignment: start
            chips:
              - type: action
                icon: mdi:weather-sunny
                content: Bright
                tap_action:
                  action: call-service
                  service: scene.turn_on
                  service_data:
                    entity_id: scene.REPLACE_ME_bright
              - type: action
                icon: mdi:weather-night
                content: Night
                tap_action:
                  action: call-service
                  service: scene.turn_on
                  service_data:
                    entity_id: scene.REPLACE_ME_night
              - type: action
                icon: mdi:movie-open
                content: Movie
                tap_action:
                  action: call-service
                  service: scene.turn_on
                  service_data:
                    entity_id: scene.REPLACE_ME_movie
              - type: action
                icon: mdi:lightbulb-off
                content: All Off
                tap_action:
                  action: call-service
                  service: light.turn_off
                  service_data:
                    entity_id: all

      # ---- Status tiles row (4-up KPI grid) ----
      - type: grid
        column_span: 3
        cards:
          - type: heading
            heading: Status
            heading_style: subtitle
          - type: custom:mushroom-template-card
            primary: "{{ states('sensor.REPLACE_ME_temperature') }}°"
            secondary: Temp
            icon: mdi:thermometer
            icon_color: orange
            layout: vertical
            fill_container: true
          - type: custom:mushroom-template-card
            primary: "{{ states('sensor.REPLACE_ME_humidity') }}%"
            secondary: Humidity
            icon: mdi:water-percent
            icon_color: blue
            layout: vertical
            fill_container: true
          - type: custom:mushroom-template-card
            primary: "{{ states('binary_sensor.REPLACE_ME_motion') }}"
            secondary: Motion
            icon: mdi:motion-sensor
            icon_color: green
            layout: vertical
            fill_container: true
          - type: custom:mushroom-template-card
            primary: "{{ expand('group.all_lights') | selectattr('state','eq','on') | list | count }}"
            secondary: Lights On
            icon: mdi:lightbulb-on
            icon_color: amber
            layout: vertical
            fill_container: true

      # ---- Room cards (one section per room) ----
      - type: grid
        column_span: 3
        cards:
          - type: heading
            heading: Rooms
            heading_style: subtitle
          - type: custom:mushroom-template-card
            primary: Living Room
            secondary: |-
              {{ expand('light.REPLACE_ME_living_room') | selectattr('state','eq','on') | list | count }} on
              · {{ states('sensor.REPLACE_ME_living_room_temp') }}°
            icon: mdi:sofa
            icon_color: |-
              {% if expand('light.REPLACE_ME_living_room') | selectattr('state','eq','on') | list | count > 0 %}
                orange
              {% else %}
                disabled
              {% endif %}
            tap_action:
              action: navigate
              navigation_path: /casa/living-room
            fill_container: true
          - type: custom:mushroom-template-card
            primary: Kitchen
            secondary: |-
              {{ expand('light.REPLACE_ME_kitchen') | selectattr('state','eq','on') | list | count }} on
            icon: mdi:silverware-fork-knife
            icon_color: |-
              {% if expand('light.REPLACE_ME_kitchen') | selectattr('state','eq','on') | list | count > 0 %}
                orange
              {% else %}
                disabled
              {% endif %}
            tap_action:
              action: navigate
              navigation_path: /casa/kitchen
            fill_container: true
          - type: custom:mushroom-template-card
            primary: Bedroom
            secondary: |-
              {{ expand('light.REPLACE_ME_bedroom') | selectattr('state','eq','on') | list | count }} on
            icon: mdi:bed
            icon_color: |-
              {% if expand('light.REPLACE_ME_bedroom') | selectattr('state','eq','on') | list | count > 0 %}
                orange
              {% else %}
                disabled
              {% endif %}
            tap_action:
              action: navigate
              navigation_path: /casa/bedroom
            fill_container: true
          - type: custom:mushroom-template-card
            primary: Office
            secondary: |-
              {{ expand('light.REPLACE_ME_office') | selectattr('state','eq','on') | list | count }} on
            icon: mdi:desk
            icon_color: |-
              {% if expand('light.REPLACE_ME_office') | selectattr('state','eq','on') | list | count > 0 %}
                orange
              {% else %}
                disabled
              {% endif %}
            tap_action:
              action: navigate
              navigation_path: /casa/office
            fill_container: true

  # ---------------------------------------------------------------------------
  # Per-room detail view (template — duplicate per room)
  # ---------------------------------------------------------------------------
  - title: Living Room
    path: living-room
    type: sections
    icon: mdi:sofa
    sections:
      - type: grid
        cards:
          - type: heading
            heading: Living Room
            heading_style: title
          - type: custom:mushroom-light-card
            entity: light.REPLACE_ME_living_room_main
            show_brightness_control: true
            show_color_temp_control: true
            show_color_control: true
            collapsible_controls: true
            fill_container: true
          - type: custom:mushroom-light-card
            entity: light.REPLACE_ME_living_room_lamp
            show_brightness_control: true
            collapsible_controls: true
            fill_container: true

      - type: grid
        cards:
          - type: heading
            heading: Climate
            heading_style: subtitle
          - type: custom:mushroom-climate-card
            entity: climate.REPLACE_ME_thermostat
            show_temperature_control: true
            hvac_modes:
              - auto
              - heat
              - cool
              - "off"
            fill_container: true

      - type: grid
        cards:
          - type: heading
            heading: Media
            heading_style: subtitle
          - type: custom:mushroom-media-player-card
            entity: media_player.REPLACE_ME_living_room
            volume_controls:
              - volume_mute
              - volume_set
              - volume_buttons
            media_controls:
              - on_off
              - shuffle
              - previous
              - play_pause_stop
              - next
            fill_container: true
