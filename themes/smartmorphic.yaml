      # ---- card-mod ----
      card-mod-theme: Smartmorphic

      card-mod-root-yaml: |
        .: |
          ::-webkit-scrollbar { width: 10px; height: 10px; }
          ::-webkit-scrollbar-track { background: transparent; }
          ::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.10);
            border-radius: 999px;
            border: 2px solid transparent;
            background-clip: content-box;
          }
          ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.20); background-clip: content-box; }
          *:focus-visible {
            outline: 2px solid var(--smartmorphic-accent);
            outline-offset: 3px;
            border-radius: 4px;
          }

      card-mod-card-yaml: |
        .: |
          ha-card {
            transition: box-shadow 0.25s cubic-bezier(0.25,0.46,0.45,0.94);
            border-radius: var(--smartmorphic-radius) !important;
          }
          ha-card .icon, ha-card state-badge {
            border-radius: 12px;
            padding: 6px;
            background: var(--ha-card-background);
            box-shadow: var(--smartmorphic-neu-pressed-sm);
            transition: box-shadow 0.2s, color 0.2s;
          }
          ha-card .state-badge ha-state-icon[data-state="on"],
          ha-card .icon[data-state="on"] {
            color: var(--smartmorphic-accent) !important;
            box-shadow:
              var(--smartmorphic-neu-pressed-sm),
              0 0 12px var(--smartmorphic-accent-glow);
          }
          /* Tile card stat text uses Outfit display weight */
          hui-tile-card .primary,
          ha-tile-info .primary {
            font-family: 'Outfit', system-ui, -apple-system, sans-serif !important;
            font-weight: 500 !important;
            letter-spacing: -0.2px;
          }
          hui-tile-card .secondary,
          ha-tile-info .secondary {
            font-weight: 500 !important;
          }
          /* Tile card icons: brighter accent glow on dark surface */
          hui-tile-card ha-tile-icon {
            transition: filter 0.25s ease-out, transform 0.15s ease-out;
            filter: drop-shadow(0 0 10px var(--smartmorphic-accent-glow-tight));
          }
          hui-tile-card:active ha-tile-icon {
            transform: scale(0.95);
          }
          /* Mushroom cards: match stat font */
          mushroom-state-info .primary,
          mushroom-card .primary {
            font-family: 'Outfit', system-ui, -apple-system, sans-serif !important;
            font-weight: 500 !important;
          }
          ha-card hui-entities-toggle,
          ha-card .divider, ha-card hr {
            background: var(--divider-color) !important;
          }
          ha-card mwc-button[outlined],
          ha-card mwc-button[unelevated] {
            --mdc-shape-small: 12px;
            --mdc-button-outline-width: 0;
            box-shadow: var(--smartmorphic-neu-raised-sm);
          }
          ha-card mwc-button:active {
            box-shadow: var(--smartmorphic-neu-pressed-sm);
          }

      card-mod-more-info-yaml: |
        .: |
          ha-dialog {
            --mdc-shape-medium: 18px;
            --mdc-dialog-min-width: 360px;
          }
          ha-dialog .mdc-dialog__surface {
            box-shadow: var(--smartmorphic-neu-raised-lg) !important;
            background: var(--ha-card-background);
          }

      card-mod-view-yaml: |
        .: |
          hui-view {
            padding: 8px 4px;
          }
